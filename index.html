  <script>
    // Traductions (FR/EN/ES/DE/IT)
    const COVID_TRANSLATIONS = {

        countersText: (v, c, vac) => `Virus actifs : ${v}   Cellules restantes : ${c}   Vaccins : ${vac}`,
        gameOver: "Toutes les cellules ont été infectées!"
      },
      en: {
        title: "the COVID-19 Game",
        resetBtn: "Reset the game",
        showRules: "Show instructions",
        hideRules: "Hide instructions",
        rules: [
          "COVID-19 Game (created by Joel Sandé, Saguenay lac Saint-Jean) for educational purposes: learning while having fun.",

          "- ",
          "- * * * Please share this educational game far and wide :)"
        ],
        badges: ['', '🥉 Recruit', '🥈 Fighter', '🥇 Veteran', '🏅 Expert', '🏆 Champion', '👑 Legend'],
        levelUpNormal: (level, badge) => `Level ${level} — ${badge}`,
        levelUpRecord: (level, badge) => `Level ${level} — ${badge} — YOU BEAT THE RECORD!`,
        recordText: (recordLevel, recordHolder, personalBest) => `(Record: ${recordLevel}, ${recordHolder} · Your best: ${personalBest})`,
        scoreText: (sc, level, badge) => `Score: ${sc}   Level ${level}${badge ? ' ' + badge : ''}`,
        countersText: (v, c, vac) => `Active viruses: ${v}   Remaining cells: ${c}   Vaccines: ${vac}`,
        gameOver: "All cells have been infected!"
      },
      es: {
        title: "el Juego del COVID-19",
        resetBtn: "Reiniciar la partida",
        showRules: "Mostrar instrucciones",
        hideRules: "Ocultar instrucciones",
        rules: [
          "Juego del COVID-19 (creado por Joel Sandé, Saguenay lac Saint-Jean) con fines educativos: aprendo divirtiéndome.",
          "- Juego para facilitar el aprendizaje escolar.",
          "- Al principio aparece un único virus Covid-19, con células verdes que proteger.",
          "- Los virus infectan las células (verdes) y luego las destruyen.",
          "- Un virus puede decidir atravesar una célula, o infectarla.",
          "- Al infectarse, se propagan 2 virus.",
          "- Haz clic en la pantalla para crear una vacuna (Moderna, Pfizer o Novavax).",
          "- Las vacunas se mueven solas o pueden moverse con el ratón.",
          "- Al contacto con una vacuna, el virus es eliminado.",
          "- Si todos los virus desaparecen, haz clic para generar 10 virus, lo que reinicia la partida.",
          "- Las velocidades aumentan en cada regeneración.",
          "- El nivel aumenta en cada regeneración: ¡desbloquea títulos (🥉🥈🥇🏅🏆👑)!",
          "- Si superas el nivel 5, toma una captura de pantalla y envíala a oremi.joel@gmail.com: al final de cada mes, se seleccionarán 10 personas entre los correos recibidos para recibir regalos!",
          "- ",
          "- * * * Por favor, comparte masivamente este juego educativo :)"
        ],
        badges: ['', '🥉 Recluta', '🥈 Combatiente', '🥇 Veterano', '🏅 Experto', '🏆 Campeón', '👑 Leyenda'],
        levelUpNormal: (level, badge) => `Nivel ${level} — ${badge}`,
        levelUpRecord: (level, badge) => `Nivel ${level} — ${badge} — ¡SUPERAS EL RÉCORD!`,
        recordText: (recordLevel, recordHolder, personalBest) => `(Récord: ${recordLevel}, ${recordHolder} · Tu mejor: ${personalBest})`,
        scoreText: (sc, level, badge) => `Puntuación: ${sc}   Nivel ${level}${badge ? ' ' + badge : ''}`,
        countersText: (v, c, vac) => `Virus activos: ${v}   Células restantes: ${c}   Vacunas: ${vac}`,
        gameOver: "¡Todas las células han sido infectadas!"
      },
      de: {
        title: "das COVID-19-Spiel",
        resetBtn: "Spiel zurücksetzen",
        showRules: "Anleitung anzeigen",
        hideRules: "Anleitung ausblenden",
        rules: [
          "COVID-19-Spiel (erstellt von Joel Sandé, Saguenay lac Saint-Jean) zu Bildungszwecken: Lernen mit Spaß.",
          "- Spiel zur Unterstützung des schulischen Lernens.",
          "- Zu Beginn erscheint nur ein einziges Covid-19-Virus, mit grünen Zellen, die es zu schützen gilt.",
          "- Die Viren infizieren die Zellen (grün) und zerstören sie dann.",
          "- Ein Virus kann sich entscheiden, eine Zelle zu durchqueren oder sie zu infizieren.",
          "- Bei einer Infektion breiten sich 2 Viren aus.",
          "- Klicke auf den Bildschirm, um einen Impfstoff zu erzeugen (Moderna, Pfizer oder Novavax).",
          "- Die Impfstoffe bewegen sich von selbst oder können mit der Maus bewegt werden.",
          "- Bei Kontakt mit einem Impfstoff wird das Virus eliminiert.",
          "- Wenn alle Viren verschwinden, klicke, um 10 neue Viren zu erzeugen, was die Runde zurücksetzt.",
          "- Die Geschwindigkeiten erhöhen sich bei jeder Neuerzeugung.",

          "- Wenn du Level 5 überschreitest, mach einen Screenshot und schick ihn an oremi.joel@gmail.com: am Ende jedes Monats werden 10 Personen unter den erhaltenen E-Mails ausgewählt, um Geschenke zu erhalten!",
          "- ",
          "- * * * Bitte teile dieses Lernspiel fleißig :)"
        ],
        badges: ['', '🥉 Rekrut', '🥈 Kämpfer', '🥇 Veteran', '🏅 Experte', '🏆 Champion', '👑 Legende'],
        levelUpNormal: (level, badge) => `Level ${level} — ${badge}`,
        levelUpRecord: (level, badge) => `Level ${level} — ${badge} — DU ÜBERTRIFFST DEN REKORD!`,
        recordText: (recordLevel, recordHolder, personalBest) => `(Rekord: ${recordLevel}, ${recordHolder} · Deine Bestleistung: ${personalBest})`,
        scoreText: (sc, level, badge) => `Punktzahl: ${sc}   Level ${level}${badge ? ' ' + badge : ''}`,
        countersText: (v, c, vac) => `Aktive Viren: ${v}   Verbleibende Zellen: ${c}   Impfstoffe: ${vac}`,
        gameOver: "Alle Zellen wurden infiziert!"
      },
      it: {
        title: "il Gioco del COVID-19",
        resetBtn: "Reimposta la partita",
        showRules: "Mostra istruzioni",
        hideRules: "Nascondi istruzioni",
        rules: [
          "Gioco del COVID-19 (creato da Joel Sandé, Saguenay lac Saint-Jean) a scopo educativo: imparo divertendomi.",
          "- Gioco per facilitare l'apprendimento scolastico.",
          "- All'inizio appare un solo virus Covid-19, con cellule verdi da proteggere.",
          "- I virus infettano le cellule (verdi), poi le distruggono.",
          "- Un virus può decidere di attraversare una cellula, oppure infettarla.",
          "- All'infezione, si propagano 2 virus.",
          "- Clicca sullo schermo per creare un vaccino (Moderna, Pfizer o Novavax).",
          "- I vaccini si muovono da soli o possono essere spostati con il mouse.",
          "- Al contatto con un vaccino, il virus viene eliminato.",
          "- Se tutti i virus scompaiono, clicca per generare 10 virus, il che resetta la partita.",
          "- Le velocità aumentano ad ogni rigenerazione.",
          "- Il livello aumenta ad ogni rigenerazione: sblocca titoli (🥉🥈🥇🏅🏆👑)!",
          "- Se superi il livello 5, fai uno screenshot e inviala a oremi.joel@gmail.com: alla fine di ogni mese, 10 persone saranno selezionate tra le email ricevute per ricevere regali!",
          "- ",
          "- * * * Per favore condividi in massa questo gioco educativo :)"
        ],
        badges: ['', '🥉 Recluta', '🥈 Combattente', '🥇 Veterano', '🏅 Esperto', '🏆 Campione', '👑 Leggenda'],
        levelUpNormal: (level, badge) => `Livello ${level} — ${badge}`,
        levelUpRecord: (level, badge) => `Livello ${level} — ${badge} — SUPERI IL RECORD!`,
        recordText: (recordLevel, recordHolder, personalBest) => `(Record: ${recordLevel}, ${recordHolder} · Il tuo migliore: ${personalBest})`,
        scoreText: (sc, level, badge) => `Punteggio: ${sc}   Livello ${level}${badge ? ' ' + badge : ''}`,
        countersText: (v, c, vac) => `Virus attivi: ${v}   Cellule rimanenti: ${c}   Vaccini: ${vac}`,
        gameOver: "Tutte le cellule sono state infettate!"
      }
    };

    let currentLang = localStorage.getItem('covidGameLang') || 'fr';
    function tr() { return COVID_TRANSLATIONS[currentLang]; }

    // Canvas et contexte
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // Dimensions logiques (sans DPR)
    let logicalWidth;
    let logicalHeight;

    // Générateur aléatoire
    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    // CLASSES
    class Cell {
      constructor(x, y, r) {
        this.x = x;
        this.y = y;
        this.radius = r;
        this.infected = false;
      }
      draw() {
        ctx.fillStyle = this.infected ? 'yellow' : 'green';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    class Virus {
      constructor(x, y, target) {
        this.x = x;
        this.y = y;
        this.radius = 10;
        this.speed = random(1, 2) / 4 * speedFactor;
        this.target = target;
        this.calcVel();
      }
      calcVel() {
        const dx = this.target.x - this.x;
        const dy = this.target.y - this.y;
        const mag = Math.hypot(dx, dy);
        this.vx = dx / mag * this.speed;
        this.vy = dy / mag * this.speed;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
      }
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        // Corps
        ctx.fillStyle = 'red';
        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fill();
        // Piquants
        for (let i = 0; i < 8; i++) {
          const ang = i * Math.PI / 4;
          ctx.beginPath();
          ctx.moveTo(this.radius * Math.cos(ang), this.radius * Math.sin(ang));
          ctx.lineTo((this.radius + 5) * Math.cos(ang), (this.radius + 5) * Math.sin(ang));
          ctx.strokeStyle = 'red';
          ctx.lineWidth = 2;
          ctx.stroke();
        }
        // Label
        const fs = Math.max(10, logicalWidth * 0.01);
        ctx.font = `${fs}px Arial`;
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        ctx.fillText('Covid-19', 0, this.radius + fs + 2);
        ctx.restore();
      }
    }

    class Vaccine {
      constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.radius = 15;
        this.type = type;
        this.color = type === 'Moderna'
          ? 'blue'
          : type === 'Pfizer'
            ? 'white'
            : 'orange';
        const ang = random(0, 2 * Math.PI);
        this.speed = 0.5 * speedFactor;
        this.vx = Math.cos(ang) * this.speed;
        this.vy = Math.sin(ang) * this.speed;
      }
      update() {
        if (draggedVaccine !== this) {
          this.x += this.vx;
          this.y += this.vy;
          if (this.x - this.radius < 0 || this.x + this.radius > logicalWidth) this.vx *= -1;
          if (this.y - this.radius < 0 || this.y + this.radius > logicalHeight) this.vy *= -1;
        }
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.strokeStyle = 'black';
        ctx.stroke();
        const fs = Math.max(10, logicalWidth * 0.01);
        ctx.font = `${fs}px Arial`;
        ctx.fillStyle = 'black';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.type, this.x, this.y);
      }
    }

    // VARIABLES DE JEU
    let speedFactor = 1.0;
    const numCells = 10;

    // Chronomètre du score : se fige à la fin d'une partie (victoire ou défaite)
    // et reprend seulement quand les 10 nouveaux virus sont générés.
    let scoreElapsedMs = 0;
    let scoreActiveStart = Date.now();
    let scorePaused = false;

    let cells = [];
    let viruses = [];
    let vaccines = [];
    let draggedVaccine = null;
    let offX = 0;
    let offY = 0;
    let showRules = true;

    // Niveaux et gamification
    let level = 0;
    let levelUpMessage = '';
    let levelUpUntil = 0;

    // Record officiel affiché : mis à jour manuellement selon les captures d'écran reçues par courriel
    const recordLevel = 9;
    const recordHolder = 'Luc Tremblay';

    // Meilleur niveau personnel du joueur, suivi automatiquement sur cet appareil (localStorage)
    let personalBest = parseInt(localStorage.getItem('covidGamePersonalBest') || '0', 10);

    // Récompenses virtuelles débloquées selon le niveau atteint
    function getBadge(lvl) {
      if (lvl <= 0) return '';
      return tr().badges[Math.min(lvl, 6)];
    }

    function levelUp() {
      level++;
      if (level > personalBest) {
        personalBest = level;
        localStorage.setItem('covidGamePersonalBest', String(personalBest));
      }
      const beatsRecord = level > recordLevel;
      const badge = getBadge(level);
      levelUpMessage = beatsRecord
        ? tr().levelUpRecord(level, badge)
        : tr().levelUpNormal(level, badge);
      levelUpUntil = Date.now() + 2500;
    }

    // Création initiale
    function createCells() {
      cells = [];
      for (let i = 0; i < numCells; i++) {
        const m = 80;
        const x = random(m, logicalWidth - m);
        const y = random(m, logicalHeight - m);
        const r = random(20, 40);
        cells.push(new Cell(x, y, r));
      }
    }
    function chooseTarget() {
      return cells.length
        ? cells[Math.floor(random(0, cells.length))]
        : null;
    }
    function spawnVirus() {
      const edge = Math.floor(random(0, 4));
      let x, y;
      if (edge === 0) { x = random(0, logicalWidth); y = -20; }
      else if (edge === 1) { x = logicalWidth + 20; y = random(0, logicalHeight); }
      else if (edge === 2) { x = random(0, logicalWidth); y = logicalHeight + 20; }
      else { x = -20; y = random(0, logicalHeight); }
      const t = chooseTarget();
      if (t) viruses.push(new Virus(x, y, t));
    }

    // Démarrage
    function init() {
      logicalWidth = window.innerWidth;
      logicalHeight = window.innerHeight;
      createCells();
      // Seulement 5 virus au tout premier lancement, pour laisser le temps de lire les règles
      viruses = [];
      for (let i = 0; i < 5; i++) spawnVirus();
      resizeCanvas();
      animate();
    }

    // Resize et recalcule positions proportionnelles
    function resizeCanvas() {
      const newW = window.innerWidth;
      const newH = window.innerHeight;
      const scaleX = newW / logicalWidth;
      const scaleY = newH / logicalHeight;
      // Redimensionne positions
      cells.forEach(c => { c.x *= scaleX; c.y *= scaleY; });
      viruses.forEach(v => { v.x *= scaleX; v.y *= scaleY; v.vx *= scaleX; v.vy *= scaleY; });
      vaccines.forEach(v => { v.x *= scaleX; v.y *= scaleY; v.vx *= scaleX; v.vy *= scaleY; });
      logicalWidth = newW;
      logicalHeight = newH;
      // Ajuste le canvas en pixels
      const dpr = window.devicePixelRatio || 1;
      canvas.style.width = newW + 'px';
      canvas.style.height = newH + 'px';
      canvas.width = newW * dpr;
      canvas.height = newH * dpr;
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
    }
    window.addEventListener('resize', resizeCanvas);

    // Collision simple
    function checkCollision(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y) < a.radius + b.radius;
    }

    function handleInfection(v) {
      v.target.infected = true;
      viruses = viruses.filter(x => x !== v);
      setTimeout(() => {
        cells = cells.filter(c => c !== v.target);
        for (let i = 0; i < 2; i++) {
          const nt = chooseTarget();
          if (nt) viruses.push(new Virus(v.x, v.y, nt));
        }
      }, 500);
    }

    function resetGame() {
      vaccines = [];
      viruses = [];
      createCells();
      speedFactor += 0.2;
      levelUp();
      for (let i = 0; i < 10; i++) spawnVirus();
    }

    // Interactions souris/clic
    canvas.addEventListener('click', e => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      if (!viruses.length || !cells.length) {
        resetGame();
      } else if (!draggedVaccine) {
        const types = ['Moderna', 'Pfizer', 'Novavax'];
        vaccines.push(new Vaccine(x, y, types[Math.floor(random(0, 3))]));
      }
    });
    canvas.addEventListener('mousedown', e => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      vaccines.slice().reverse().forEach(v => {
        if (!draggedVaccine && checkCollision({ x, y, radius: 5 }, v)) {
          draggedVaccine = v;
          offX = x - v.x;
          offY = y - v.y;
        }
      });
    });
    canvas.addEventListener('mousemove', e => {
      if (draggedVaccine) {
        const rect = canvas.getBoundingClientRect();
        draggedVaccine.x = e.clientX - rect.left - offX;
        draggedVaccine.y = e.clientY - rect.top - offY;
      }
    });
    canvas.addEventListener('mouseup', () => { draggedVaccine = null; });

    // Bouton de réinitialisation manuelle (au cas où la partie resterait bloquée)
    document.getElementById('resetBtn').addEventListener('click', resetGame);

    // Bouton d'affichage/masquage des instructions
    const toggleRulesBtn = document.getElementById('toggleRulesBtn');
    toggleRulesBtn.addEventListener('click', () => {
      showRules = !showRules;
      toggleRulesBtn.textContent = showRules ? tr().hideRules : tr().showRules;
    });

    // Affichage règles & score
    function drawRules() {
      if (!showRules) return;
      ctx.fillStyle = 'white';
      const fs = Math.max(12, logicalWidth * 0.012);
      ctx.font = `${fs}px Arial`;
      ctx.textAlign = 'left';
      const rules = tr().rules;
      const scoreFs = Math.max(16, logicalWidth * 0.02);
      const compteurFs = Math.max(12, logicalWidth * 0.012);
      const startY = scoreTopOffset + scoreFs * 2 + 4 + compteurFs + 6 + 25; // décalé sous l'affichage du record, du score et le compteur
      const maxWidth = logicalWidth - 20;
      const wrappedLines = [];
      rules.forEach(t => {
        const words = t.split(' ');
        let line = '';
        words.forEach(word => {
          const testLine = line ? line + ' ' + word : word;
          if (ctx.measureText(testLine).width > maxWidth && line) {
            wrappedLines.push(line);
            line = word;
          } else {
            line = testLine;
          }
        });
        wrappedLines.push(line);
      });
      wrappedLines.forEach((t, i) => ctx.fillText(t, 10, startY + i * (fs + 4)));
    }

    // Fige le chronomètre dès que la partie est terminée (plus de virus ou plus de cellules),
    // et le relance seulement quand une nouvelle partie (10 virus) est générée.
    function updateScoreClock() {
      const roundOver = !viruses.length || !cells.length;
      if (roundOver && !scorePaused) {
        scoreElapsedMs += Date.now() - scoreActiveStart;
        scorePaused = true;
      } else if (!roundOver && scorePaused) {
        scoreActiveStart = Date.now();
        scorePaused = false;
      }
    }

    function getScoreSeconds() {
      const activeMs = scorePaused ? 0 : (Date.now() - scoreActiveStart);
      return ((scoreElapsedMs + activeMs) / 1000).toFixed(2);
    }

    // Espace réservé en haut pour ne pas chevaucher les boutons (Réinitialiser / Masquer les instructions)
    const scoreTopOffset = 80;

    function drawScore() {
      const sc = getScoreSeconds();
      ctx.fillStyle = 'white';
      const fs = Math.max(16, logicalWidth * 0.02);
      ctx.font = `${fs}px Arial`;
      ctx.textAlign = 'center';
      const badge = getBadge(level);
      const recordTxt = tr().recordText(recordLevel, recordHolder, personalBest);
      ctx.fillText(recordTxt, logicalWidth / 2, scoreTopOffset + fs);
      const scoreNiveauTxt = tr().scoreText(sc, level, badge);
      ctx.fillText(scoreNiveauTxt, logicalWidth / 2, scoreTopOffset + fs * 2 + 4);
      const compteurFs = Math.max(12, logicalWidth * 0.012);
      ctx.font = `${compteurFs}px Arial`;
      ctx.fillText(tr().countersText(viruses.length, cells.length, vaccines.length), logicalWidth / 2, scoreTopOffset + fs * 2 + 4 + compteurFs + 6);
    }

    function drawLevelUpBanner() {
      if (Date.now() >= levelUpUntil) return;
      const fs = Math.max(22, logicalWidth * 0.03);
      ctx.font = `bold ${fs}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillStyle = 'gold';
      ctx.fillText(levelUpMessage, logicalWidth / 2, logicalHeight * 0.15);
    }

    // Boucle d'animation
    function animate() {
      updateScoreClock();
      ctx.clearRect(0, 0, logicalWidth, logicalHeight);
      drawRules();
      drawScore();
      drawLevelUpBanner();
      cells.forEach(c => c.draw());
      for (let i = viruses.length - 1; i >= 0; i--) {
        const v = viruses[i];
        v.update();
        v.draw();
        if (checkCollision(v, v.target)) handleInfection(v);
        for (let j = vaccines.length - 1; j >= 0; j--) {
          if (checkCollision(v, vaccines[j])) {
            viruses.splice(i, 1);
            break;
          }
        }
      }
      vaccines.forEach(v => { v.update(); v.draw(); });
      if (!cells.length) {
        ctx.fillStyle = 'red';
        const fs = Math.max(30, logicalWidth * 0.04);
        ctx.font = `${fs}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText(tr().gameOver, logicalWidth / 2, logicalHeight / 2);
      }
      requestAnimationFrame(animate);
    }

    // Met à jour les textes statiques (titre, boutons) selon la langue courante
    function updateStaticText() {
      document.title = tr().title;
      document.documentElement.lang = currentLang;
      document.getElementById('resetBtn').textContent = tr().resetBtn;
      toggleRulesBtn.textContent = showRules ? tr().hideRules : tr().showRules;
    }

    // Sélecteur de langue (FR/EN/ES/DE/IT)
    (function(){
      const container = document.getElementById('langSwitcher');
      const langs = ['fr', 'en', 'es', 'de', 'it'];
      langs.forEach(lang => {
        const btn = document.createElement('button');
        btn.className = 'lang-btn' + (lang === currentLang ? ' active' : '');
        btn.dataset.lang = lang;
        btn.textContent = lang.toUpperCase();
        btn.addEventListener('click', () => {
          currentLang = lang;
          localStorage.setItem('covidGameLang', lang);
          container.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          updateStaticText();
        });
        container.appendChild(btn);
      });
    })();

    updateStaticText();

    // Initialise tout
    init();
  </script>
</body>
</html>
